<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Architecture</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5">
        <h2 class="text-center mb-2 fw-bold text-dark">📊 Expense Tracker Architecture</h2>
        <p class="text-center text-muted mb-4">Industry Standard Multi-Folder Structure Setup</p>
        
        <div class="row text-center mb-4">
            <div class="col-md-4 mb-3">
                <div class="card border-0 shadow-sm p-3 bg-white" style="border-left: 5px solid #198754 !important;">
                    <span class="text-muted small fw-bold text-uppercase">Total Income</span>
                    <h3 class="text-success fw-bold mt-1" id="total-income">₹0.00</h3>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card border-0 shadow-sm p-3 bg-white" style="border-left: 5px solid #dc3545 !important;">
                    <span class="text-muted small fw-bold text-uppercase">Total Expenses</span>
                    <h3 class="text-danger fw-bold mt-1" id="total-expense">₹0.00</h3>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card border-0 shadow-sm p-3 bg-white" style="border-left: 5px solid #0d6efd !important;">
                    <span class="text-muted small fw-bold text-uppercase">Net Balance</span>
                    <h3 class="text-primary fw-bold mt-1" id="net-balance">₹0.00</h3>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-5 mb-4">
                <div class="card p-4 shadow-sm border-0 bg-white">
                    <h5 class="mb-3 fw-bold text-secondary">➕ Add Transaction</h5>
                    <form id="transaction-form">
                        <div class="mb-3">
                            <input type="text" id="text" class="form-control" placeholder="Description / Title" required>
                        </div>
                        <div class="mb-3">
                            <input type="number" id="amount" class="form-control" placeholder="Amount (negative for expense)" required>
                        </div>
                        <div class="mb-3">
                            <select id="category" class="form-select" required>
                                <option value="Salary/Job">Salary/Job</option>
                                <option value="Food">Food</option>
                                <option value="Rent">Rent</option>
                                <option value="Entertainment">Entertainment</option>
                                <option value="Others">Others</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Add Data</button>
                    </form>
                </div>
                
                <div class="card p-4 shadow-sm border-0 bg-white mt-4">
                    <h5 class="mb-3 fw-bold text-secondary">📉 Visual Analytics</h5>
                    <div style="max-width: 280px; margin: 0 auto;">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card p-4 shadow-sm border-0 bg-white">
                    <h5 class="mb-3 fw-bold text-secondary">📋 Data Logs (From Database)</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Title</th>
                                    <th>Category</th>
                                    <th class="text-end">Amount</th>
                                    <th class="text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="transaction-list-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
